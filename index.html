<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哲学思想脉络图</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+XiaoWei&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0a0a0f;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
  --text: #e0ddd5;
  --text-dim: #8a8780;
  --accent-gold: #c9a84c;
  --accent-blue: #4a7fb5;
  --accent-red: #b54a4a;
  --accent-green: #4ab576;
  --accent-purple: #8a4ab5;
  --accent-orange: #b57a4a;
  --glow: rgba(201,168,76,0.15);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif SC', serif;
  overflow-x: hidden;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

header {
  text-align: center;
  padding: 60px 20px 30px;
}
header h1 {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  color: var(--accent-gold);
  letter-spacing: 0.15em;
  text-shadow: 0 0 40px rgba(201,168,76,0.3);
}
header p {
  color: var(--text-dim);
  margin-top: 12px;
  font-size: 0.95rem;
  letter-spacing: 0.05em;
}

.legend {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  padding: 10px 20px 20px;
  font-size: 0.75rem;
  color: var(--text-dim);
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

.path-nav {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  padding: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: linear-gradient(var(--bg), var(--bg) 80%, transparent);
  padding-bottom: 40px;
}
.path-btn {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  color: var(--text-dim);
  padding: 8px 20px;
  border-radius: 30px;
  cursor: pointer;
  font-family: 'Noto Serif SC', serif;
  font-size: 0.85rem;
  transition: all 0.4s;
  backdrop-filter: blur(10px);
}
.path-btn:hover, .path-btn.active {
  color: var(--accent-gold);
  border-color: var(--accent-gold);
  box-shadow: 0 0 20px var(--glow);
  transform: translateY(-2px);
}

.timeline {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 30px 80px;
  position: relative;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 50%;
  top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(transparent, var(--accent-gold) 10%, var(--accent-gold) 90%, transparent);
  opacity: 0.2;
}

.era {
  position: relative;
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.era.visible { opacity: 1; transform: translateY(0); }
.era.dimmed { opacity: 0.1 !important; pointer-events: none; }

.era-label { text-align: center; margin-bottom: 15px; position: relative; }
.era-label span {
  display: inline-block;
  padding: 6px 28px;
  border-radius: 20px;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.1em;
}
.era-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  position: absolute;
  left: 50%; transform: translateX(-50%);
  top: -6px; z-index: 2;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 22px 26px;
  margin: 8px 0;
  cursor: pointer;
  transition: all 0.4s;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  border-radius: 3px 0 0 3px;
}
.card:hover {
  border-color: rgba(255,255,255,0.15);
  transform: translateX(4px);
  box-shadow: -4px 0 30px rgba(0,0,0,0.3);
}
.card.dimmed { opacity: 0.1; pointer-events: none; }
.card h3 { font-size: 0.95rem; color: var(--accent-gold); margin-bottom: 8px; font-weight: 700; }
.card p { font-size: 0.85rem; line-height: 1.8; color: var(--text-dim); }

/* Path colors */
[data-path="认识论"] .era-label span { color: var(--accent-blue); border: 1px solid rgba(74,127,181,0.3); background: rgba(74,127,181,0.08); }
[data-path="认识论"] .era-dot { background: var(--accent-blue); box-shadow: 0 0 12px var(--accent-blue); }
[data-path="认识论"] .card::before { background: var(--accent-blue); }

[data-path="反理性"] .era-label span { color: var(--accent-red); border: 1px solid rgba(181,74,74,0.3); background: rgba(181,74,74,0.08); }
[data-path="反理性"] .era-dot { background: var(--accent-red); box-shadow: 0 0 12px var(--accent-red); }
[data-path="反理性"] .card::before { background: var(--accent-red); }

[data-path="语言学"] .era-label span { color: var(--accent-green); border: 1px solid rgba(74,181,118,0.3); background: rgba(74,181,118,0.08); }
[data-path="语言学"] .era-dot { background: var(--accent-green); box-shadow: 0 0 12px var(--accent-green); }
[data-path="语言学"] .card::before { background: var(--accent-green); }

[data-path="自我"] .era-label span { color: var(--accent-purple); border: 1px solid rgba(138,74,181,0.3); background: rgba(138,74,181,0.08); }
[data-path="自我"] .era-dot { background: var(--accent-purple); box-shadow: 0 0 12px var(--accent-purple); }
[data-path="自我"] .card::before { background: var(--accent-purple); }

[data-path="神学"] .era-label span { color: var(--accent-orange); border: 1px solid rgba(181,122,74,0.3); background: rgba(181,122,74,0.08); }
[data-path="神学"] .era-dot { background: var(--accent-orange); box-shadow: 0 0 12px var(--accent-orange); }
[data-path="神学"] .card::before { background: var(--accent-orange); }

[data-path="本体论"] .era-label span { color: var(--accent-gold); border: 1px solid rgba(201,168,76,0.3); background: rgba(201,168,76,0.08); }
[data-path="本体论"] .era-dot { background: var(--accent-gold); box-shadow: 0 0 12px var(--accent-gold); }
[data-path="本体论"] .card::before { background: var(--accent-gold); }

.detail-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 30px;
}
.detail-overlay.show { display: flex; }
.detail-panel {
  background: #141418;
  border: 1px solid var(--card-border);
  border-radius: 16px;
  max-width: 650px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 40px;
  position: relative;
  animation: panelIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes panelIn {
  from { opacity: 0; transform: scale(0.95) translateY(20px); }
}
.detail-panel .close-btn {
  position: absolute; top: 16px; right: 20px;
  background: none; border: none;
  color: var(--text-dim); font-size: 1.5rem; cursor: pointer;
}
.detail-panel h2 { font-size: 1.3rem; color: var(--accent-gold); margin-bottom: 8px; }
.detail-panel .era-tag { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 20px; display: block; }
.detail-panel .content { font-size: 0.95rem; line-height: 2; color: var(--text); }
.detail-panel .connections { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--card-border); }
.detail-panel .connections h4 { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 10px; }
.conn-tag {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.75rem;
  margin: 3px;
  cursor: pointer;
  border: 1px solid var(--card-border);
  color: var(--text-dim);
  transition: all 0.3s;
}
.conn-tag:hover { color: var(--accent-gold); border-color: var(--accent-gold); }
</style>
</head>
<body>

<header>
  <h1>西方哲学思想脉络</h1>
  <p>从古希腊到当代 · 六条思想路径的交织与演进</p>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent-gold)"></div>本体论</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent-blue)"></div>认识论</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent-red)"></div>反理性</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent-green)"></div>语言学转向</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent-purple)"></div>自我建构</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent-orange)"></div>神学演变</div>
</div>

<nav class="path-nav">
  <button class="path-btn active" data-filter="all">全部脉络</button>
  <button class="path-btn" data-filter="本体论">本体论</button>
  <button class="path-btn" data-filter="认识论">认识论</button>
  <button class="path-btn" data-filter="反理性">反理性暗流</button>
  <button class="path-btn" data-filter="语言学">语言学转向</button>
  <button class="path-btn" data-filter="自我">自我建构</button>
  <button class="path-btn" data-filter="神学">神学演变</button>
</nav>

<div class="timeline" id="timeline"></div>

<div class="detail-overlay" id="overlay">
  <div class="detail-panel">
    <button class="close-btn" onclick="closeDetail()">×</button>
    <h2 id="detail-title"></h2>
    <span class="era-tag" id="detail-era"></span>
    <div class="content" id="detail-content"></div>
    <div class="connections" id="detail-connections"></div>
  </div>
</div>

<script>
const DATA = [
  {id:'gr-nature',era:'古希腊',path:'本体论',title:'自然哲学的起源',content:'道家顺其自然，儒家以人的社会性理解自然（天行健君子以自强不息，地势坤君子以厚德载物）。古希腊则从具体存在走向抽象存在，探索元素(element)、时间起源、目的与归宿——最终指向大写的"神"。',connections:['gr-logic','hegel']},
  {id:'gr-logic',era:'古希腊',path:'本体论',title:'逻辑与二元对立',content:'感性的现象与本质（抽象的理念世界）形成二元对立。柏拉图将可感世界与理念世界分开，开创了西方哲学两千年的核心张力。',connections:['gr-nature','plato-god','self-construct']},
  {id:'hegel',era:'德国观念论',path:'本体论',title:'黑格尔：绝对精神',content:'存在、逻辑、本体、思维都是一体的——统一于"绝对精神"。黑格尔试图克服二元对立，将一切纳入辩证发展的精神运动之中。',connections:['gr-logic','kant','self-expand']},

  {id:'epistem',era:'近代哲学',path:'认识论',title:'转向认识论',content:'哲学核心问题从"存在是什么"转向"我们如何认识"——认识能力本身成为反思对象。',connections:['rational','empiric']},
  {id:'rational',era:'近代哲学',path:'认识论',title:'大陆理性派',content:'提出概念，再进行演绎推理。以笛卡尔"我思故我在"为起点，试图从先天理性出发建构确定性知识。',connections:['epistem','kant']},
  {id:'empiric',era:'近代哲学',path:'认识论',title:'经验主义',content:'强调后天经验、假设验证与归纳总结。但容易走向怀疑论和不可知论——休谟的问题动摇了因果关系的确定性。',connections:['epistem','kant']},
  {id:'kant',era:'康德',path:'认识论',title:'感性 + 知性 + 理性',content:'康德综合理性派与经验派：感性提供材料，知性加工为知识，理性追求统一。同时划定理性边界——超出经验的理性无法胜任，经验之外靠信仰。',connections:['rational','empiric','kant-turn']},
  {id:'kant-turn',era:'康德',path:'认识论',title:'认识论的哥白尼革命',content:'康德之前：主观须符合客观（符合论）。康德之后：客观围绕主观转——你有什么样的认识框架，就有什么样的世界。',connections:['kant','cassirer','anti-reason']},
  {id:'cassirer',era:'新康德主义',path:'认识论',title:'卡西尔：文化批判',content:'不仅要做理性批判，还要做文化批判——世界是什么样，由文化形式决定。哲学与艺术的使命：改造文化即改造世界。',connections:['kant-turn','culture-form']},

  {id:'anti-reason',era:'反理性暗流',path:'反理性',title:'对理性的挑战',content:'康德也有贡献：超出经验的理性无法胜任。更根本的追问：人是理性的吗？理性是根本的吗？',connections:['kant','schopen','nietzsche','freud','darwin']},
  {id:'schopen',era:'反理性暗流',path:'反理性',title:'叔本华：意志与痛苦',content:'反理性主义者。理性只是工具，意志才是主人。意志又是盲目冲动的，因此人生本质上是痛苦的。',connections:['anti-reason','nietzsche']},
  {id:'nietzsche',era:'反理性暗流',path:'反理性',title:'尼采：权力意志',content:'认可意志，但赋予其积极力量——意志即权力。尼采同时打破天上的柏拉图主义（基督教）和地上的柏拉图主义（追求抽象理念而非活生生的生活）。要活在今生今世，活在当下。',connections:['schopen','god-twilight','self-deconstruct']},
  {id:'freud',era:'反理性暗流',path:'反理性',title:'弗洛伊德：潜意识',content:'更彻底地否定理性：人并非由理性主导，而是生活在潜意识之中，尤其受性欲驱动。理性不过是表面的冰山一角。',connections:['anti-reason']},
  {id:'darwin',era:'反理性暗流',path:'反理性',title:'达尔文：进化论的冲击',content:'物种在进化之前谈何本质？物种没有本质，进化没有目的。先验的一切被否定，人类精神滑向虚无主义。',connections:['anti-reason','self-deconstruct']},

  {id:'lang-turn',era:'当代哲学',path:'语言学',title:'语言决定认识',content:'从"我们如何认识"进一步转向"语言如何决定认识"——你的概念系统、语词、语法结构决定了你的认识边界。',connections:['kant-turn','sci-line','human-line']},
  {id:'sci-line',era:'当代哲学',path:'语言学',title:'科学主义路径',content:'走向数理逻辑、实证主义、符号化。以逻辑实证主义为代表，试图用精确语言消除哲学混乱。',connections:['lang-turn','popper','kuhn']},
  {id:'human-line',era:'当代哲学',path:'语言学',title:'人本主义路径',content:'海德格尔与后期维特根斯坦。语言不仅是工具，更是存在的家园。日常语言中蕴含着对世界的原初理解。',connections:['lang-turn','phenomenology']},
  {id:'culture-form',era:'当代哲学',path:'语言学',title:'文化形式与生命力',content:'生命力取决于所采用的文化形式系统：理性能力（科学）、欲望（消费主义）、情感、艺术能力、意志、直觉运动、超越性、宗教体验等。选择什么文化形式，就决定了生命力的绽放方式。',connections:['cassirer','path3']},
  {id:'popper',era:'当代哲学',path:'语言学',title:'波普尔：证伪主义',content:'科学在证伪中不断进步——不能被证伪的都不是科学。如易经无法证伪，故不属于科学范畴。',connections:['sci-line','kuhn']},
  {id:'kuhn',era:'当代哲学',path:'语言学',title:'库恩：科学范式转移',content:'科学不是线性进步的，而是在范式之间发生革命性跳跃。常规科学在旧范式内运作，异常积累导致范式危机与革命。',connections:['popper']},
  {id:'pragmatism',era:'当代哲学',path:'语言学',title:'实用主义：杜威',content:'面对真实的生活理性。知识不是对世界的镜像反映，而是解决实际问题的工具。真理即有效。',connections:['lang-turn']},
  {id:'phenomenology',era:'当代哲学',path:'语言学',title:'现象学',content:'面向事物本身！有两条路径：现象还原（悬置自然态度）和本质还原（直观本质结构）。',connections:['human-line','path3']},

  {id:'path1',era:'三条路的探索',path:'本体论',title:'① 找绝对真理——失败',content:'物自体、客观世界、自然科学……试图找到独立于人的绝对真理，但始终无法跨越认识论的鸿沟。',connections:['path2']},
  {id:'path2',era:'三条路的探索',path:'本体论',title:'② 找绝对自我——失败',content:'从笛卡尔"我思"→ 康德先验自我 → 费希特绝对自我 → 谢林绝对统一 → 黑格尔绝对精神 → 维特根斯坦语言批判。私人定义和私人语言都失败了。',connections:['path1','path3']},
  {id:'path3',era:'三条路的探索',path:'本体论',title:'③ 在世界中定义自我',content:'观念世界，公在先于存在。在与世界互动过程中展开自我、定义自我。To be 在 to do 中实现。',connections:['path2','self-reconstruct']},

  {id:'plato-god',era:'神学演变',path:'神学',title:'古希腊：诸神时代',content:'多神崇拜——地方神与功能神并存，众神具有人性的弱点与欲望。',connections:['gr-logic','god-twilight']},
  {id:'god-twilight',era:'神学演变',path:'神学',title:'诸神的黄昏',content:'从多神走向一神的过程中，众神退场。理性与信仰的张力逐渐凸显。',connections:['plato-god','god-human']},
  {id:'god-human',era:'神学演变',path:'神学',title:'从神到人间',content:'强调个体的主体性、自由意志与创造性。但危险在于：极端化后把上帝拉下来，用"自我"来替代——自我封神。',connections:['god-twilight','self-expand','nietzsche']},

  {id:'self-construct',era:'自我的历程',path:'自我',title:'① 古希腊：自我的建构',content:'柏拉图主义与基督教共同建构了人对自身的理解——灵魂不朽、理念世界、道德秩序。',connections:['gr-logic','self-expand']},
  {id:'self-expand',era:'自我的历程',path:'自我',title:'② 启蒙运动：自我膨胀',content:'先验自我被奉为绝对理性，成为一切判断的依据。人成为经济、政治、宗教、科学、道德上的独立人。新上帝变成了"自我"、"金钱"与"科学"（甚至走向科学主义与还原论——其中没有意义与价值，宇宙变得冷漠）。诸神之争。',connections:['self-construct','hegel','god-human','self-deconstruct']},
  {id:'self-deconstruct',era:'自我的历程',path:'自我',title:'③ 当代：自我的解构',content:'把自我解构为权力（福柯）、符号（德里达）、欲望（德勒兹）、消费（鲍德里亚）。主体不再是统一的实体，而是多重力量交织的场域。',connections:['self-expand','nietzsche','darwin','self-reconstruct']},
  {id:'self-reconstruct',era:'自我的历程',path:'自我',title:'④ 重构的可能',content:'在与世界互动中展开自我——to be 在 to do 中实现。既非绝对真理，也非绝对自我，而是在关系中不断生成。',connections:['self-deconstruct','path3']},
];

const ERA_ORDER = ['古希腊','近代哲学','康德','新康德主义','德国观念论','反理性暗流','当代哲学','三条路的探索','神学演变','自我的历程'];

let currentFilter = 'all';

function render() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  const grouped = {};
  DATA.forEach(d => { if (!grouped[d.era]) grouped[d.era] = []; grouped[d.era].push(d); });

  ERA_ORDER.forEach(era => {
    if (!grouped[era]) return;
    const items = grouped[era];
    const mainPath = items[0].path;
    const hasMatch = items.some(i => currentFilter === 'all' || i.path === currentFilter);

    const section = document.createElement('div');
    section.className = 'era' + (hasMatch ? '' : ' dimmed');
    section.dataset.path = mainPath;

    section.innerHTML = `
      <div class="era-label"><div class="era-dot"></div><span>${era}</span></div>
      ${items.map(item => {
        const dim = currentFilter !== 'all' && item.path !== currentFilter;
        return `<div class="card${dim ? ' dimmed' : ''}" onclick="showDetail('${item.id}')">
          <h3>${item.title}</h3>
          <p>${item.content.slice(0, 80)}${item.content.length > 80 ? '…' : ''}</p>
        </div>`;
      }).join('')}`;
    tl.appendChild(section);
  });

  requestAnimationFrame(() => {
    document.querySelectorAll('.era').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 80);
    });
  });
}

function showDetail(id) {
  const item = DATA.find(d => d.id === id);
  if (!item) return;
  document.getElementById('detail-title').textContent = item.title;
  document.getElementById('detail-era').textContent = `${item.era} · ${item.path}`;
  document.getElementById('detail-content').textContent = item.content;
  const connDiv = document.getElementById('detail-connections');
  const conns = (item.connections||[]).map(cid => DATA.find(d => d.id === cid)).filter(Boolean);
  connDiv.innerHTML = conns.length ? `<h4>相关思想节点</h4>${conns.map(c =>
    `<span class="conn-tag" onclick="showDetail('${c.id}')">${c.title}</span>`).join('')}` : '';
  document.getElementById('overlay').classList.add('show');
}

function closeDetail() { document.getElementById('overlay').classList.remove('show'); }

document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });
document.querySelectorAll('.path-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.path-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });
render();
</script>
</body>
</html>
